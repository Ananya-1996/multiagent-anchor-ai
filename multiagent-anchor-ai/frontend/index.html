<html><body style='font-family:Segoe UI;background:#a1c4fd;margin:0'><div style='max-width:700px;margin:20px auto;background:white;padding:15px;border-radius:12px;height:90vh;display:flex;flex-direction:column'><div id='dashboard'></div><div id='agentBox'>🤖 Ready</div><div id='chat' style='flex:1;overflow:auto'></div><div><input id='msg' style='width:70%'><button onclick='send()'>Send</button><button onclick='voice()'>🎤</button></div></div><script>function updateDashboard(d){document.getElementById('dashboard').innerHTML='🌿 Dashboard<br>Mood:'+d.mood+'<br>Tasks:'+d.tasks+'<br>Streak:'+d.streak;}function animateAgents(a){let b=document.getElementById('agentBox');b.innerHTML='';let i=0;function step(){if(i<a.length){b.innerHTML+='⚡ '+a[i]+'<br>';i++;setTimeout(step,400);}}step();}function add(t,c){let d=document.createElement('div');d.style.margin='10px';d.style.padding='10px';d.style.borderRadius='10px';d.style.background=c=='user'?'#667eea':'#edf2f7';d.style.color=c=='user'?'white':'black';d.innerHTML=t.replace(/\n/g,'<br>');document.getElementById('chat').appendChild(d);}async function send(){let m=document.getElementById('msg').value;if(!m)return;add(m,'user');document.getElementById('msg').value='';document.getElementById('agentBox').innerHTML='🤖 Thinking...';let r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})});let d=await r.json();animateAgents(d.agents);updateDashboard(d.dashboard);setTimeout(()=>{add(d.message,'bot');},600);}function voice(){const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();rec.onresult=e=>{document.getElementById('msg').value=e.results[0][0].transcript;send();};rec.start();}</script></body></html>
